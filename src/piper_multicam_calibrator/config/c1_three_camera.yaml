project:
  name: c1_three_camera_calibration
  dataset_root: ./datasets/c1_three_camera
  output_root: ./outputs

robot:
  base_frame: base_link
  tool_frame: link_tcp
  tf_timeout_sec: 0.3

cameras:
  wrist:
    image_topic: /wrist_camera/color/image_raw
    camera_info_topic: /wrist_camera/color/camera_info
    frame_id: wrist_camera_color_optical_frame
    role: wrist_eye_in_hand
  mid:
    image_topic: /mid_camera/color/image_raw
    camera_info_topic: /mid_camera/color/camera_info
    frame_id: mid_camera_color_optical_frame
    role: external_mid
  far:
    image_topic: /far_camera/color/image_raw
    camera_info_topic: /far_camera/color/camera_info
    frame_id: far_camera_color_optical_frame
    role: external_far

board:
  type: charuco
  square_length_m: 0.030
  marker_length_m: 0.022
  squares_x: 8
  squares_y: 11
  dictionary: DICT_5X5_100

calibration_tasks:
  - name: wrist_eye_in_hand
    type: eye_in_hand
    camera: wrist
    output_parent: link_tcp
    output_child: wrist_camera_color_optical_frame
  - name: mid_eye_to_hand
    type: eye_to_hand_known_board
    camera: mid
    output_parent: base_link
    output_child: mid_camera_color_optical_frame
  - name: far_to_mid
    type: camera_to_camera
    reference_camera: mid
    target_camera: far
    output_parent: mid_camera_color_optical_frame
    output_child: far_camera_color_optical_frame
