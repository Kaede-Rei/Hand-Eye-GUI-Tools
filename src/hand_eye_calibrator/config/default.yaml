project:
  name: multifunction_hand_eye_calibration
  dataset_root: ./datasets/hand_eye_calibration
  output_root: ./outputs

robot:
  base_frame: base_link
  tool_frame: link_tcp
  tf_timeout_sec: 0.3

cameras:
  ee_camera:
    image_topic: /ee_camera/color/image_raw
    camera_info_topic: /ee_camera/color/camera_info
    frame_id: ee_camera_color_optical_frame
    role: eye_in_hand
    fx: 600
    fy: 600
    cx: 320
    cy: 240
    dist: "0,0,0,0,0"
  fixed_camera:
    image_topic: /fixed_camera/color/image_raw
    camera_info_topic: /fixed_camera/color/camera_info
    frame_id: fixed_camera_color_optical_frame
    role: eye_to_hand
    fx: 600
    fy: 600
    cx: 320
    cy: 240
    dist: "0,0,0,0,0"
  aux_camera:
    image_topic: /aux_camera/color/image_raw
    camera_info_topic: /aux_camera/color/camera_info
    frame_id: aux_camera_color_optical_frame
    role: auxiliary
    fx: 600
    fy: 600
    cx: 320
    cy: 240
    dist: "0,0,0,0,0"

board:
  type: charuco
  square_length_m: 0.030
  marker_length_m: 0.022
  squares_x: 8
  squares_y: 11
  dictionary: DICT_5X5_100

calibration_tasks:
  - name: ee_eye_in_hand
    type: eye_in_hand
    camera: ee_camera
    output_parent: link_tcp
    output_child: ee_camera_color_optical_frame
  - name: fixed_eye_to_hand
    type: eye_to_hand
    camera: fixed_camera
    output_parent: base_link
    output_child: fixed_camera_color_optical_frame
  - name: aux_to_fixed
    type: camera_to_camera
    reference_camera: fixed_camera
    target_camera: aux_camera
    output_parent: fixed_camera_color_optical_frame
    output_child: aux_camera_color_optical_frame
