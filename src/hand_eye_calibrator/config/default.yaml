project:
  name: multifunction_hand_eye_calibration
  dataset_root: ./datasets/hand_eye_calibration
  output_root: ./outputs

robot:
  base_frame: base_link
  tool_frame: link6
  tf_timeout_sec: 0.3

cameras:
  wrist:
    image_topic: /piper/camera/wrist/color/image_raw
    camera_info_topic: /piper/camera/wrist/color/camera_info
    frame_id: wrist_color_optical_frame
    role: eye_in_hand
    fx: 600
    fy: 600
    cx: 320
    cy: 240
    dist: "0,0,0,0,0"
  mid:
    image_topic: /piper/camera/mid/color/image_raw
    camera_info_topic: /piper/camera/mid/color/camera_info
    frame_id: mid_color_optical_frame
    role: eye_to_hand
    fx: 600
    fy: 600
    cx: 320
    cy: 240
    dist: "0,0,0,0,0"
  far:
    image_topic: /piper/camera/far/color/image_raw
    camera_info_topic: /piper/camera/far/color/camera_info
    frame_id: far_color_optical_frame
    role: auxiliary
    fx: 600
    fy: 600
    cx: 320
    cy: 240
    dist: "0,0,0,0,0"

board:
  type: charuco
  square_length_m: 0.030
  marker_length_m: 0.022
  squares_x: 8
  squares_y: 11
  dictionary: DICT_5X5_100

calibration_tasks:
  - name: ee_eye_in_hand
    type: eye_in_hand
    camera: wrist
    output_parent: link6
    output_child: wrist_color_optical_frame
  - name: fixed_eye_to_hand
    type: eye_to_hand
    camera: mid
    output_parent: base_link
    output_child: mid_color_optical_frame
  - name: aux_to_fixed
    type: camera_to_camera
    reference_camera: mid
    target_camera: far
    output_parent: mid_color_optical_frame
    output_child: far_color_optical_frame
